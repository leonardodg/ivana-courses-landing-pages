# =============================================================================
# PRODUCTION - Optimized for production deployment
# =============================================================================
# Usage:
#     docker compose -f .devcontainer/compose/prod.yml up -d
# =============================================================================

services:
  web:
    image: nginx:1.25-alpine
    container_name: courses-nginx
    restart: unless-stopped
    environment:
      - APP_URL=https://courses.ivana.academy
      - APP_ENV=production
    ports:
      - "8088:80"
    networks:
      - ivana_network

networks:
  ivana_network:
    external: true