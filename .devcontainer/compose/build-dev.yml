# =============================================================================
# DEVELOPMENT OVERRIDE - Local development with hot-reload
# =============================================================================
# Usage:
#     docker compose -f .devcontainer/compose/dev.yml -f .devcontainer/compose/build-dev.yml up --build -d
# =============================================================================

services:
  web:
    build:
      context: ../../
      dockerfile: .devcontainer/build/nginx.Dockerfile
      target: development
      args:
        - APP_ENV=development
    env_file:
      - ../env/default.env
    environment:
      - APP_ENV=${ENVIRONMENT:-development}
      - APP_DEBUG=${DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost}
      - TZ=America/Sao_Paulo
