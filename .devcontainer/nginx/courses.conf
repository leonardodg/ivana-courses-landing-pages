# /etc/nginx/sites-available/courses.conf
# ─────────────────────────────────────────────────────────────────
# Ivana Academy — Courses Landing Pages
# Proxy: Nginx host → Docker courses-nginx (localhost:8080)
# SSL: Certbot (Let's Encrypt)
# CDN: Cloudflare Full (strict)
# ─────────────────────────────────────────────────────────────────

upstream courses_backend {
    server localhost:8088;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name courses.ivana.academy;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name courses.ivana.academy;

    # SSL — preenchido pelo Certbot automaticamente
    # certbot --nginx -d courses.ivana.academy
    ssl_certificate /etc/letsencrypt/live/courses.ivana.academy/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/courses.ivana.academy/privkey.pem; # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Logs
    access_log /var/log/nginx/courses_access.log;
    error_log  /var/log/nginx/courses_error.log;

    client_max_body_size 10M;

    # ── Proxy → Docker container ─────────────────────────────────
    location / {
        proxy_pass         http://courses_backend;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        # Cloudflare
        proxy_set_header CF-Connecting-IP   $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry       $http_cf_ipcountry;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       off;
    }

    # Health check interno
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}